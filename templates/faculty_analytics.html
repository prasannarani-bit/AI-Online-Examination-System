{% extends 'base.html' %}
{% block content %}
<h2>Exam Analytics Dashboard</h2>
<div class="row mt-4">
    {% for report in reports %}
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-info text-white fw-bold">{{ report.title }}</div>
            <div class="card-body text-center">
                {% if report.chart %}
                <img src="{{ report.chart }}" class="img-fluid rounded border">
                {% else %}
                <p class="text-muted mt-3">No attempts have been evaluated yet.</p>
                {% endif %}
            </div>
        </div>
    </div>
    {% else %}
    <div class="alert alert-info">No published exams with analytics found.</div>
    {% endfor %}
</div>
{% endblock %}
