{% extends 'base.html' %}
{% block content %}
<h2>Manage Users</h2>
<div class="card mb-4 shadow-sm border-0">
    <div class="card-body">
        <h5 class="card-title">Add New User</h5>
        <form method="POST" action="{{ url_for('manage_users') }}">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="new_username" class="form-control" placeholder="Username" required>
                </div>
                <div class="col-md-4">
                    <input type="password" name="new_password" class="form-control" placeholder="Password" required>
                </div>
                <div class="col-md-2">
                    <select name="new_role" class="form-select" required>
                        <option value="faculty">Faculty</option>
                        <option value="student">Student</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Add User</button>
                </div>
            </div>
        </form>
    </div>
</div>

<table class="table table-hover bg-white shadow-sm rounded">
    <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
        </tr>
    </thead>
    <tbody>
        {% for user_row in users %}
        <tr>
            <td>{{ user_row.id }}</td>
            <td>{{ user_row.username }}</td>
            <td><span
                    class="badge {% if user_row.role == 'admin' %}bg-danger{% elif user_row.role == 'faculty' %}bg-primary{% else %}bg-success{% endif %}">{{
                    user_row.role|capitalize }}</span></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
