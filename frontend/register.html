<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Register a new account on the Agentic AI Exam System">
    <title>Register - Agentic Exam System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .role-fields { transition: all 0.3s ease; }
        .field-icon { min-width: 38px; }
    </style>
</head>

<body class="bg-light">
    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div id="alertMsg" class="alert d-none"></div>
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-success text-white text-center py-4">
                        <i class="bi bi-person-plus fs-2 d-block mb-1"></i>
                        <h4 class="mb-0 fw-bold">Create New Account</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="registerForm" novalidate>

                            <!-- Role Selection (first so fields adapt) -->
                            <div class="mb-3">
                                <label for="role" class="form-label fw-bold">I am a</label>
                                <select id="role" class="form-select form-select-lg" required>
                                    <option value="" disabled selected>Select your role…</option>
                                    <option value="student">Student</option>
                                    <option value="faculty">Faculty / Teacher</option>
                                </select>
                            </div>

                            <!-- Common Fields -->
                            <div class="mb-3">
                                <label for="full_name" class="form-label fw-bold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text field-icon"><i class="bi bi-person"></i></span>
                                    <input type="text" id="full_name" class="form-control form-control-lg"
                                        placeholder="Enter your full name" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text field-icon"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" class="form-control form-control-lg"
                                        placeholder="you@example.com" required autocomplete="email">
                                </div>
                                <div class="form-text">This will be your login ID.</div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text field-icon"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="password" class="form-control form-control-lg"
                                        placeholder="Create a strong password" required autocomplete="new-password">
                                </div>
                            </div>

                            <!-- Student-specific fields -->
                            <div id="studentFields" class="role-fields d-none">
                                <hr class="my-3">
                                <p class="text-muted small fw-bold mb-3"><i class="bi bi-mortarboard me-1"></i>STUDENT DETAILS</p>
                                <div class="mb-3">
                                    <label for="class_name" class="form-label fw-bold">Class / Batch</label>
                                    <div class="input-group">
                                        <span class="input-group-text field-icon"><i class="bi bi-people"></i></span>
                                        <input type="text" id="class_name" class="form-control"
                                            placeholder="e.g. BCA 3rd Year, CSE-A 2024">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="roll_number" class="form-label fw-bold">Roll Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text field-icon"><i class="bi bi-hash"></i></span>
                                        <input type="text" id="roll_number" class="form-control"
                                            placeholder="e.g. 2024CSE101">
                                    </div>
                                </div>
                            </div>

                            <!-- Faculty-specific fields -->
                            <div id="facultyFields" class="role-fields d-none">
                                <hr class="my-3">
                                <p class="text-muted small fw-bold mb-3"><i class="bi bi-building me-1"></i>FACULTY DETAILS</p>
                                <div class="mb-3">
                                    <label for="department" class="form-label fw-bold">Department</label>
                                    <div class="input-group">
                                        <span class="input-group-text field-icon"><i class="bi bi-diagram-3"></i></span>
                                        <input type="text" id="department" class="form-control"
                                            placeholder="e.g. Computer Science, Mathematics">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" id="registerBtn" class="btn btn-success btn-lg w-100 fw-bold">
                                    <i class="bi bi-person-check me-2"></i>Create Account
                                </button>
                            </div>
                        </form>
                        <hr class="mt-4 mb-3">
                        <div class="text-center">
                            <p class="mb-0">Already have an account? <a href="login.html" class="text-decoration-none fw-bold">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Show/hide role-specific fields when role changes
        document.getElementById('role').addEventListener('change', function () {
            const role = this.value;
            document.getElementById('studentFields').classList.toggle('d-none', role !== 'student');
            document.getElementById('facultyFields').classList.toggle('d-none', role !== 'faculty');
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertEl = document.getElementById('alertMsg');
            alertEl.className = 'alert d-none';

            const role = document.getElementById('role').value;
            if (!role) {
                alertEl.textContent = 'Please select your role.';
                alertEl.className = 'alert alert-danger';
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

            const payload = {
                email:       document.getElementById('email').value.trim().toLowerCase(),
                password:    document.getElementById('password').value,
                role:        role,
                full_name:   document.getElementById('full_name').value.trim(),
                class_name:  role === 'student' ? document.getElementById('class_name').value.trim() : '',
                roll_number: role === 'student' ? document.getElementById('roll_number').value.trim() : '',
                department:  role === 'faculty' ? document.getElementById('department').value.trim() : ''
            };

            const res = await ApiClient.post('/register', payload);

            if (res.ok) {
                alertEl.textContent = res.data.message + ' Redirecting to login…';
                alertEl.className = 'alert alert-success';
                setTimeout(() => { window.location.href = 'login.html'; }, 1800);
            } else {
                alertEl.textContent = res.data.message || 'Registration failed. Please try again.';
                alertEl.className = 'alert alert-danger';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account';
            }
        });
    </script>
</body>

</html>
