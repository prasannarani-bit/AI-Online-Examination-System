<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Agentic Exam System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="user-nav"></ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-4">Student Dashboard</h2>

        <h4 class="mt-4">Available Exams</h4>
        <div class="row mt-3" id="availableExamsContainer">
        </div>

        <h4 class="mt-5">Your Past Attempts</h4>
        <table class="table table-hover mt-3 shadow-sm bg-white rounded">
            <thead class="table-light">
                <tr>
                    <th>Exam</th>
                    <th>Date</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="pastAttemptsContainer">
            </tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        ApiClient.checkAuth(['student']);
        ApiClient.setupNav();

        // Check for pending exam from shared link
        const pendingExamId = localStorage.getItem('pending_exam_id');
        if (pendingExamId) {
            localStorage.removeItem('pending_exam_id');
            window.location.href = `pre_exam.html?id=${pendingExamId}`;
        }

        async function loadDashboard() {
            const res = await ApiClient.get('/student/dashboard');
            if (res.ok) {
                const ac = document.getElementById('availableExamsContainer');
                if (res.data.available_exams.length === 0) {
                    ac.innerHTML = `<div class="col-12"><div class="alert alert-info">No exams are currently published and available to take.</div></div>`;
                } else {
                    ac.innerHTML = res.data.available_exams.map(e => `
                        <div class="col-md-4">
                            <div class="card bg-white shadow-sm border-0 mb-4 h-100">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title fw-bold text-primary">${e.title}</h5>
                                    <p class="card-text text-muted flex-grow-1">${e.description || 'No description assigned.'}</p>
                                    <ul class="list-unstyled mb-3">
                                        <li><strong>Duration:</strong> ${e.duration_minutes} mins</li>
                                        <li><strong>Passing Score:</strong> ${e.passing_score}%</li>
                                    </ul>
                                    <a href="pre_exam.html?id=${e.id}" class="btn btn-primary w-100 fw-bold mt-auto">Start Exam</a>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                const pc = document.getElementById('pastAttemptsContainer');
                if (res.data.past_attempts.length === 0) {
                    pc.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No past attempts found.</td></tr>`;
                } else {
                    const formatTime = (utcStr) => {
                        if (!utcStr) return '—';
                        const date = new Date(utcStr + ' UTC');
                        return date.toLocaleString(undefined, {
                            year: 'numeric', month: 'short', day: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                    };

                    pc.innerHTML = res.data.past_attempts.map(a => `
                        <tr>
                            <td>${a.title}</td>
                            <td>${formatTime(a.start_time)}</td>
                            <td>${a.status === 'evaluated' ? a.score : '-'}</td>
                            <td>${a.status === 'evaluated' ? '<span class="badge bg-success">Evaluated</span>' : a.status === 'submitted' ? '<span class="badge bg-info">Submitted</span>' : '<span class="badge bg-warning">In Progress</span>'}</td>
                            <td>${a.status === 'evaluated' ? `<a href="results.html?attempt_id=${a.id}" class="btn btn-sm btn-outline-primary">View Result</a>` : ''}</td>
                        </tr>
                    `).join('');
                }
            }
        }
        loadDashboard();
    </script>
</body>

</html>
