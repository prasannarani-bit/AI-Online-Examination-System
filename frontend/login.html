<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Login to the Agentic AI Exam System">
    <title>Login - Agentic Exam System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <i class="bi bi-shield-lock fs-2 d-block mb-1"></i>
                        <h4 class="mb-0 fw-bold">Login to Exam System</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" class="form-control form-control-lg"
                                        placeholder="you@example.com" required autocomplete="email">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <div class="input-group mb-2">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="password" class="form-control form-control-lg"
                                        placeholder="Enter your password" required autocomplete="current-password">
                                </div>
                                <div class="text-end">
                                    <a href="forgot_password.html" class="text-decoration-none small">Forgot Password?</a>
                                </div>
                            </div>
                            <button type="submit" id="loginBtn" class="btn btn-primary btn-lg w-100 fw-bold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                        </form>
                        <hr class="mt-4 mb-3">
                        <div class="text-center">
                            <p class="mb-0">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check for pending exam link
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('exam_id');
        if (examId) {
            localStorage.setItem('pending_exam_id', examId);
            
            // If already logged in as student, just redirect
            if (localStorage.getItem('token') && localStorage.getItem('role') === 'student') {
                window.location.href = `pre_exam.html?id=${examId}`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            const res = await ApiClient.post('/login', {
                email: document.getElementById('email').value.trim().toLowerCase(),
                password: document.getElementById('password').value
            });

            if (res.ok) {
                ApiClient.setToken(res.data.token);
                localStorage.setItem('role', res.data.role);
                localStorage.setItem('username', res.data.username);
                localStorage.setItem('full_name', res.data.full_name || res.data.username);
                window.location.href = 'index.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = res.data.message || 'Login failed. Please try again.';
                err.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
            }
        });
    </script>
</body>

</html>
