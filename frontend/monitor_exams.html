<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Monitor Exams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <!-- Base Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Agentic Exam System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="user-nav"></ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Live Exam Monitoring</h2>
            <button onclick="loadLogs();" class="btn btn-primary"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>
        <div class="row mt-4" id="logsContainer">
            <!-- Data Injected -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        ApiClient.checkAuth(['admin']);
        ApiClient.setupNav();

        async function loadLogs() {
            const res = await ApiClient.get('/admin/proctor_logs');
            const container = document.getElementById('logsContainer');
            if (res.ok) {
                if (res.data.length === 0) {
                    container.innerHTML = `<div class="alert alert-success"><i class="bi bi-check-circle"></i> No proctoring violations detected across recent exams.</div>`;
                } else {
                    container.innerHTML = res.data.map(log => `
                        <div class="col-md-4 mb-3">
                            <div class="card border-warning shadow-sm">
                                <div class="card-header bg-warning text-dark fw-bold">
                                    <i class="bi bi-exclamation-triangle"></i> ${log.log_type.replace('_', ' ').toUpperCase()}
                                </div>
                                <div class="card-body">
                                    <p class="mb-1"><strong>Attempt ID:</strong> ${log.attempt_id}</p>
                                    <p class="mb-1"><strong>Student:</strong> ${log.username}</p>
                                    <p class="mb-1"><strong>Exam:</strong> ${log.exam_title}</p>
                                    <p class="mb-2 text-muted small"><i class="bi bi-clock"></i> ${log.timestamp}</p>
                                    ${log.image_blob ? `<img src="${log.image_blob}" class="img-fluid rounded border border-danger">` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        }

        loadLogs();
        // optionally refresh every 10 seconds
        setInterval(loadLogs, 10000);
    </script>
</body>

</html>
