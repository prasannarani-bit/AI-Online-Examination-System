<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exam Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Agentic Exam System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="user-nav"></ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Exam Analytics Dashboard</h2>
        <div class="row mt-4" id="analyticsContainer">
            <!-- Loading message or injected content -->
            <div class="col-12">
                <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        ApiClient.checkAuth(['faculty']);
        ApiClient.setupNav();

        async function loadAnalytics() {
            const res = await ApiClient.get('/faculty/analytics');
            const container = document.getElementById('analyticsContainer');
            if (res.ok) {
                if (res.data.length === 0) {
                    container.innerHTML = `<div class="alert alert-info">No published exams with evaluated attempts found.</div>`;
                } else {
                    container.innerHTML = res.data.map(report => `
                        <div class="col-md-6 mb-4">
                            <div class="card shadow-sm border-0">
                                <div class="card-header bg-info text-white fw-bold">${report.title}</div>
                                <div class="card-body text-center">
                                    <img src="${report.chart}" class="img-fluid rounded border">
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        }
        loadAnalytics();
    </script>
</body>

</html>
