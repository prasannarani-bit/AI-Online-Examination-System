<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="View your account profile on the Agentic AI Exam System">
    <title>My Profile - Agentic Exam System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 2rem 2rem;
        }

        .profile-card {
            border: none;
            border-radius: 1rem;
            transition: transform 0.2s;
        }

        .detail-label {
            color: #6c757d;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #212529;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Agentic Exam System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="user-nav"></ul>
            </div>
        </div>
    </nav>

    <div class="profile-header shadow-sm">
        <div class="container text-center">
            <div class="d-flex flex-column align-items-center">
                <div class="avatar-circle">
                    <i class="bi bi-person"></i>
                </div>
                <h2 id="display-name" class="fw-bold mb-0">Loading...</h2>
                <span id="display-role" class="badge bg-light text-primary mt-2 px-3 py-2 rounded-pill">Role</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card profile-card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-4">
                            <i class="bi bi-person-lines-fill fs-4 me-2 text-primary"></i>
                            <h5 class="mb-0 fw-bold">Personal Information</h5>
                        </div>
                        
                        <div class="row g-4">
                            <div class="col-md-6">
                                <p class="detail-label">Full Name</p>
                                <p id="full-name" class="detail-value">-</p>
                            </div>
                            <div class="col-md-6">
                                <p class="detail-label">Email Address</p>
                                <p id="email" class="detail-value">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Academic/Professional Information (Conditional) -->
                <div class="card profile-card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-4">
                            <i class="bi bi-mortarboard-fill fs-4 me-2 text-primary"></i>
                            <h5 class="mb-0 fw-bold" id="academic-title">Academic Details</h5>
                        </div>

                        <div class="row g-4" id="academic-info-container">
                            <!-- Dynamic Content -->
                        </div>
                    </div>
                </div>

                <div class="text-center mb-5">
                    <a href="index.html" class="btn btn-outline-secondary px-4 py-2 fw-bold">
                        <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        ApiClient.checkAuth();
        ApiClient.setupNav();

        async function loadProfile() {
            const res = await ApiClient.get('/verify');
            if (res.ok) {
                const user = res.data;
                
                // Set Header Info
                document.getElementById('display-name').textContent = user.full_name;
                document.getElementById('display-role').textContent = user.role.toUpperCase();
                
                // Set Personal Info
                document.getElementById('full-name').textContent = user.full_name;
                document.getElementById('email').textContent = user.username;

                const container = document.getElementById('academic-info-container');
                const title = document.getElementById('academic-title');
                
                let html = '';
                
                if (user.role === 'student') {
                    title.textContent = 'Academic Information';
                    html = `
                        <div class="col-md-6">
                            <p class="detail-label">Roll Number</p>
                            <p class="detail-value">${user.roll_number || 'N/A'}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="detail-label">Branch</p>
                            <p class="detail-value">${user.branch || 'N/A'}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="detail-label">Course</p>
                            <p class="detail-value">${user.course_category} - ${user.course_name}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="detail-label">Year of Study</p>
                            <p class="detail-value">${user.year_of_study}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="detail-label">Section / Batch</p>
                            <p class="detail-value">${user.class_name || 'N/A'}</p>
                        </div>
                    `;
                } else if (user.role === 'faculty') {
                    title.textContent = 'Professional Information';
                    html = `
                        <div class="col-md-12">
                            <p class="detail-label">Department</p>
                            <p class="detail-value">${user.department || 'N/A'}</p>
                        </div>
                    `;
                } else if (user.role === 'admin') {
                    title.textContent = 'Administrative Information';
                    html = `
                        <div class="col-md-12">
                            <p class="detail-label">Permissions</p>
                            <p class="detail-value">Full System Access</p>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
            }
        }

        loadProfile();
    </script>
</body>

</html>
