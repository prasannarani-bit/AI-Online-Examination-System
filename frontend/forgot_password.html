<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Reset your password on the Agentic AI Exam System">
    <title>Forgot Password - Agentic Exam System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div id="alertMsg" class="alert d-none"></div>
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-warning text-dark text-center py-4">
                        <i class="bi bi-key fs-2 d-block mb-1"></i>
                        <h4 class="mb-0 fw-bold">Reset Password</h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- Step 1: Enter Email -->
                        <div id="step-1">
                            <p class="text-muted text-center mb-4">Enter your email address and we'll send you a code to reset your password.</p>
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" class="form-control form-control-lg" placeholder="you@example.com">
                                </div>
                            </div>
                            <button id="sendCodeBtn" class="btn btn-warning btn-lg w-100 fw-bold">
                                <i class="bi bi-envelope-at me-2"></i>Send Reset Code
                            </button>
                        </div>

                        <!-- Step 2: Enter Code & New Password -->
                        <div id="step-2" class="d-none">
                            <p class="text-success text-center mb-4"><i class="bi bi-check2-circle me-1"></i>Reset code sent! Please check your inbox.</p>
                            <div class="mb-3">
                                <label for="code" class="form-label fw-bold">Verification Code</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                                    <input type="text" id="code" class="form-control form-control-lg" placeholder="6-digit code">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="new_password" class="form-label fw-bold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="new_password" class="form-control form-control-lg" placeholder="Enter new password">
                                </div>
                            </div>
                            <button id="resetPassBtn" class="btn btn-primary btn-lg w-100 fw-bold">
                                <i class="bi bi-check-circle me-2"></i>Update Password
                            </button>
                        </div>

                        <hr class="mt-4 mb-3">
                        <div class="text-center">
                            <p class="mb-0"><a href="login.html" class="text-decoration-none fw-bold"><i class="bi bi-arrow-left me-1"></i>Back to Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const alertEl = document.getElementById('alertMsg');
        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const emailInput = document.getElementById('email');

        document.getElementById('sendCodeBtn').addEventListener('click', async function() {
            const email = emailInput.value.trim();
            if(!email) {
                alertEl.textContent = 'Please enter your email address.';
                alertEl.className = 'alert alert-danger';
                return;
            }

            this.disabled = true;
            this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';

            const res = await ApiClient.post('/auth/send-code', { email, purpose: 'reset' });

            if (res.ok) {
                alertEl.className = 'd-none';
                step1.classList.add('d-none');
                step2.classList.remove('d-none');
            } else {
                alertEl.textContent = res.data.message || 'Error occurred.';
                alertEl.className = 'alert alert-danger';
                this.disabled = false;
                this.innerHTML = '<i class="bi bi-envelope-at me-2"></i>Send Reset Code';
            }
        });

        document.getElementById('resetPassBtn').addEventListener('click', async function() {
            const code = document.getElementById('code').value.trim();
            const password = document.getElementById('new_password').value;
            const email = emailInput.value.trim();

            if(!code || !password) {
                alertEl.textContent = 'Code and password are required.';
                alertEl.className = 'alert alert-danger';
                return;
            }

            this.disabled = true;
            this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';

            const res = await ApiClient.post('/auth/reset-password', { email, code, password });

            if (res.ok) {
                alertEl.textContent = res.data.message;
                alertEl.className = 'alert alert-success';
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                alertEl.textContent = res.data.message || 'Error occurred.';
                alertEl.className = 'alert alert-danger';
                this.disabled = false;
                this.innerHTML = '<i class="bi bi-check-circle me-2"></i>Update Password';
            }
        });
    </script>
</body>

</html>
