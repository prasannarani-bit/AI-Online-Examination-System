<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Exam System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Base Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Agentic Exam System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="user-nav">
                    <!-- Injected via JS -->
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4" id="main-content">
        <!-- Content -->
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('role');
            const pendingExamId = localStorage.getItem('pending_exam_id');

            if (role === 'admin') {
                window.location.href = 'admin_dashboard.html';
            } else if (role === 'faculty') {
                window.location.href = 'faculty_dashboard.html';
            } else if (role === 'student') {
                if (pendingExamId) {
                    localStorage.removeItem('pending_exam_id');
                    window.location.href = `pre_exam.html?id=${pendingExamId}`;
                } else {
                    window.location.href = 'student_dashboard.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
